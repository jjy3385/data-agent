services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: data-agent-mssql
    hostname: data-agent-mssql
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"

    ports:
      - "127.0.0.1:14330:1433"

    volumes:
      - mssql-data:/var/opt/mssql
      - ./docker/mssql/backups:/var/opt/mssql/backup:ro

volumes:
  mssql-data: